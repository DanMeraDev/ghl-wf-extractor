<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Extractor de Workflows GHL</title>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #1b1f24;
        --muted: #6b7280;
        --border: #e5e7eb;
        --accent: #2563eb;
        --accent-fg: #ffffff;
        --hover: #f3f4f6;
        --ok: #16a34a;
        --err: #dc2626;
      }
      * { box-sizing: border-box; }
      body {
        width: 420px;
        margin: 0;
        font: 13px/1.4 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: var(--fg);
        background: var(--bg);
      }
      header {
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
      }
      header h1 { margin: 0; font-size: 14px; }
      header .loc { color: var(--muted); font-size: 11px; margin-top: 2px; word-break: break-all; }
      .pad { padding: 12px 14px; }
      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
      }
      input[type="search"] {
        flex: 1;
        padding: 7px 9px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font: inherit;
      }
      .linkbtn {
        background: none;
        border: none;
        color: var(--accent);
        cursor: pointer;
        font: inherit;
        padding: 4px;
        white-space: nowrap;
      }
      .linkbtn:hover { text-decoration: underline; }
      #list {
        max-height: 340px;
        overflow-y: auto;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 7px 14px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
      }
      .row:hover { background: var(--hover); }
      .row input { margin: 0; }
      .row .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .row .folder {
        color: var(--muted);
        font-size: 11px;
        background: var(--hover);
        border-radius: 4px;
        padding: 1px 6px;
        max-width: 130px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      footer {
        padding: 12px 14px;
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      button.primary {
        background: var(--accent);
        color: var(--accent-fg);
        border: none;
        border-radius: 7px;
        padding: 9px 12px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button.primary:disabled { opacity: 0.5; cursor: default; }
      .progress { height: 6px; background: var(--hover); border-radius: 999px; overflow: hidden; display: none; }
      .progress > div { height: 100%; width: 0%; background: var(--accent); transition: width 0.15s; }
      .msg { font-size: 12px; color: var(--muted); }
      .msg.err { color: var(--err); }
      .msg.ok { color: var(--ok); }
      .empty { padding: 24px 14px; text-align: center; color: var(--muted); }
      .empty code { background: var(--hover); padding: 1px 5px; border-radius: 4px; }
      #crumb {
        padding: 7px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 12px;
        color: var(--muted);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 2px;
      }
      #crumb .seg { cursor: pointer; color: var(--accent); }
      #crumb .seg:hover { text-decoration: underline; }
      #crumb .sep { color: var(--muted); margin: 0 2px; }
      #crumb .cur { color: var(--fg); font-weight: 600; }
      .row .enter {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 1;
        overflow: hidden;
      }
      .row .chev { color: var(--muted); font-size: 12px; }
      .row .count { color: var(--muted); font-size: 11px; }
      .row .path { color: var(--muted); font-size: 11px; font-style: italic; }
      .ficon { flex-shrink: 0; }
    </style>
  </head>
  <body>
    <header style="display: flex; justify-content: space-between; align-items: flex-start">
      <div>
        <h1>Extractor de Workflows GHL</h1>
        <div class="loc" id="locLabel"></div>
      </div>
      <a href="#" id="openOpts" title="Opciones" style="text-decoration: none; font-size: 16px; color: var(--muted)">⚙</a>
    </header>

    <div class="toolbar" id="toolbar" style="display: none">
      <input type="search" id="search" placeholder="Buscar por nombre..." />
      <button class="linkbtn" id="selAll">Todos</button>
      <button class="linkbtn" id="selNone">Ninguno</button>
    </div>

    <div id="crumb" style="display: none"></div>

    <div id="list"></div>
    <div class="empty" id="empty"></div>

    <footer>
      <div class="progress" id="progress"><div id="progressBar"></div></div>
      <div class="msg" id="msg"></div>
      <button class="primary" id="download" disabled>Descargar seleccionados (0)</button>
    </footer>

    <script src="../lib/jszip.min.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
